# Documentation contract — domain: backend
#
# A contract is a stack-shaped TEMPLATE for a repo's docs/.docs-manifest.yaml.
# `gen_docs bootstrap --contract <this file>` copies it into a target repo and
# stamps the bootstrap commit; `gen_docs adapt` (or the fill skill) then
# resolves every `triggers.paths: null` and `produces.params: null` against the
# repo's actual tree. Nothing here is specific to one service — `service` is
# supplied at bootstrap time and the repo-specific values are discovered, not
# hardcoded. See contracts/README.md for how a new area (frontend/infra/etl)
# is added: drop a sibling `<domain>.yaml`, no code change.

schema_version: 1
domain: backend
# Overridden by `bootstrap --service <slug>`; never a real service name here.
service: service
generator_skill: generate-docs

docs:
  # --- 01 overview -------------------------------------------------------
  - path: docs/01-overview/index.md
    section: Overview
    kind: manual
    description: |
      What this service is and why it exists: its responsibility, the bounded
      context it owns, the systems it talks to (upstream/downstream), and what
      it explicitly does NOT do. Intent-level — written for a new engineer.
    triggers:
      paths: null
      discovery_hint: >-
        The service entrypoints and the top-level package layout — where the
        application is wired together (handlers, app factory, package roots).
      hint: >-
        Re-validate when the service's responsibilities or external boundaries
        change; this is intent, not code, so it is checked by age, not diff.
      max_age_days: 180
    acknowledged_at_commit: null

  # --- 02 architecture ---------------------------------------------------
  - path: docs/02-architecture/architecture.md
    section: Architecture
    kind: heuristic
    description: |
      The service's internal architecture: its layering/style (e.g. hexagonal
      ports & adapters, layered, MVC), how a request or event flows through the
      layers, where the business core sits versus infrastructure, and the main
      extension points. Faithful to the code's actual structure — name the real
      layers, not a generic diagram.
    triggers:
      paths: null
      discovery_hint: >-
        The business-core layer and the adapter/infrastructure layer — the
        directories that hold use cases / domain logic and those that hold
        inbound/outbound integrations.
      hint: >-
        Fires when the core or adapter layers move or are restructured.
    acknowledged_at_commit: null

  - path: docs/02-architecture/source-tree.md
    section: Architecture
    kind: deterministic
    description: |
      An exact ASCII tree of the application source root, derived from
      git-tracked files — no prose, no judgement.
    triggers:
      paths: null
      discovery_hint: >-
        The application source root (the package that holds production code).
    produces:
      type: script
      command: [gen_docs, source-tree]
      params: null
      params_needed:
        root:
          description: Repo-relative path to the application source root.
          default: src
    acknowledged_at_commit: null

  - path: docs/02-architecture/test-tree.md
    section: Architecture
    kind: deterministic
    description: |
      An exact ASCII tree of the test root, derived from git-tracked files.
    triggers:
      paths: null
      discovery_hint: >-
        The test root (the directory holding unit/integration/e2e tests).
    produces:
      type: script
      command: [gen_docs, test-tree]
      params: null
      params_needed:
        root:
          description: Repo-relative path to the test root.
          default: tests
    acknowledged_at_commit: null

  # --- 03 interfaces -----------------------------------------------------
  - path: docs/03-api/api-reference.md
    section: API
    kind: deterministic
    description: |
      The HTTP API surface dumped from the application object as an OpenAPI
      spec — routes, methods, schemas. Runs only if the repo declares an app
      object; a service with no HTTP surface leaves this entry unadapted.
    triggers:
      paths: null
      discovery_hint: >-
        The module that builds/exposes the web application object (e.g. a
        FastAPI/Flask/Starlette app factory or instance).
    produces:
      type: script
      command: [gen_docs, api]
      params: null
      params_needed:
        app_module:
          description: >-
            Importable module path holding the app object
            (e.g. `src.adapters.inbound.http.app`). Stack-specific — no default.
        app_attr:
          description: >-
            Attribute name of the app object within that module (e.g. `app`).
    acknowledged_at_commit: null

  - path: docs/03-data/data-model.md
    section: Data
    kind: heuristic
    description: |
      The persistent data model: the entities the service owns, their key
      attributes and relationships, and the storage strategy actually used
      (e.g. relational tables, a DynamoDB single-table design, documents).
      Trace every claim to the domain models, schemas, or repository code.
    triggers:
      paths: null
      discovery_hint: >-
        The domain entities/models and the persistence layer (repositories,
        schema/migration definitions, table or collection declarations).
      hint: >-
        Fires when domain models, migrations, or repository contracts change.
    acknowledged_at_commit: null

  # --- 04 configuration --------------------------------------------------
  - path: docs/04-configuration/configuration.md
    section: Configuration
    kind: heuristic
    description: |
      Every configuration/environment setting the service reads, each with its
      purpose, type, default (if any), and whether it is required. A generator
      lays the skeleton from the settings module; the prose explains intent and
      operational impact. Mark secrets as such — never echo their values.
    triggers:
      paths: null
      discovery_hint: >-
        The settings/configuration module (where environment variables are
        declared and parsed, e.g. a pydantic-settings or env-config class).
      hint: >-
        Fires when the settings module gains, drops, or renames a field.
    produces:
      type: script
      command: [gen_docs, config]
      params: null
      params_needed:
        settings_module:
          description: >-
            Repo-relative path to the settings module file
            (e.g. `src/shared/config/settings.py`). Varies per repo — no default.
    acknowledged_at_commit: null

  # --- 05 operations -----------------------------------------------------
  - path: docs/05-operations/ci-cd.md
    section: Operations
    kind: heuristic
    description: |
      How the service is built, tested, and deployed: the CI/CD jobs, their
      triggers and ordering, and what each gate enforces. A generator lays the
      skeleton from the workflow files; the prose explains the pipeline intent.
    triggers:
      paths: null
      discovery_hint: >-
        The CI/CD workflow definitions (the continuous-integration and deploy
        pipeline files).
      hint: >-
        Fires when a workflow job, trigger, or deploy step changes.
    produces:
      type: script
      command: [gen_docs, ci-cd]
      params: null
      params_needed:
        workflows_dir:
          description: Repo-relative path to the CI/CD workflows directory.
          default: .github/workflows
    acknowledged_at_commit: null

  - path: docs/05-operations/scripts.md
    section: Operations
    kind: deterministic
    description: |
      The developer task surface: the Makefile targets and any standalone
      scripts, each with the one-line description the source already carries.
    triggers:
      paths: null
      discovery_hint: >-
        The task runner (Makefile or equivalent) and any scripts directory.
    produces:
      type: script
      command: [gen_docs, scripts]
      params: null
      params_needed:
        makefile:
          description: Repo-relative path to the Makefile (or task file).
          default: Makefile
        scripts_dir:
          description: Repo-relative path to the standalone scripts directory.
          default: scripts
    acknowledged_at_commit: null

  # --- 06 changelog ------------------------------------------------------
  - path: docs/06-changelog/changelog.md
    section: Changelog
    kind: deterministic
    description: |
      Recent project history pulled from `git log` — a deterministic, no-prose
      record of what changed and when.
    triggers:
      paths: null
      discovery_hint: >-
        The whole repository history (no specific path — every commit feeds it).
    produces:
      type: script
      command: [gen_docs, changelog]
      params: null
      params_needed:
        limit:
          description: How many recent commits to include.
          default: 20
    acknowledged_at_commit: null
