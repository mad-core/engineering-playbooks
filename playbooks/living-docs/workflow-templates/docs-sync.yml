# Thin caller for the org-wide docs-sync reusable workflow.
# Dropped into a target repo's .github/workflows/ by /init-docs.
# The doubled `.github/.github/` path is correct: the reusable lives in the
# repo named `.github`, under its own `.github/workflows/` directory.
# Adjust the `branches` list to match the target repo's branch model.
name: docs-sync

on:
  push:
    branches: [develop]   # adjustable per repo

jobs:
  docs-sync:
    uses: mad-core/.github/.github/workflows/docs-sync.reusable.yml@main
    with:
      service_slug: ${{ vars.SERVICE_SLUG }}
    secrets: inherit
